name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: sysguage
  TARGET: x86_64-unknown-linux-gnu

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          fi
          archive="${BIN_NAME}-${version}-${TARGET}.tar.gz"
          mkdir -p "dist/${BIN_NAME}-${version}-${TARGET}"
          cp "target/release/${BIN_NAME}" "dist/${BIN_NAME}-${version}-${TARGET}/"
          cp README.md "dist/${BIN_NAME}-${version}-${TARGET}/"
          cp -R deploy scripts "dist/${BIN_NAME}-${version}-${TARGET}/"
          tar -czf "$archive" -C dist "${BIN_NAME}-${version}-${TARGET}"
          sha256sum "$archive" > "${archive}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysguage-release-assets
          path: |
            *.tar.gz
            *.tar.gz.sha256

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            *.tar.gz
            *.tar.gz.sha256
          generate_release_notes: true

      - name: Publish GitHub Release from dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            *.tar.gz
            *.tar.gz.sha256
          generate_release_notes: true
